<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>DuckDuckRich Login_Signup Screen</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <style>
        /* @charset "UTF-8"; */
*{box-sizing: border-box; text-decoration: none; color: #333;}
body{margin: 0; height: 874px; width: 402px; display: flex; flex-direction: column; background: #fff; font-family: 'Paperlogy', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden;}
.wrap{width: 402px; height: 874px;}
.wrap::before{content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 252, 230, 0.2); z-index: 1;}
.wrap > *{position: relative; z-index: 2; display: flex; flex-direction: column; text-align: center;}

.background{position: absolute; bottom: 0; z-index: 0; left: -100px;}
.background img{width: 120%;}
.logo{width: 100%; align-items: center; justify-content: center; margin: 20px auto;}
.logo img{width: 200px;}
.down{position: absolute; bottom: 20px; width: 402px; left: 0; display: flex; flex-direction: column; gap: 30px;}
.icons{display: flex; justify-content: center; align-items: center; gap: 20px;}
.kakao a{width: 60px; height: 60px; border-radius: 50%; background: #B39A00; display: block; line-height: 60px; font-size: 1.8rem;}
.apple a{width: 60px; height: 60px; border-radius: 50%; background: #00995E; display: block; line-height: 60px; font-size: 1.8rem;}

.btn{display: flex; flex-direction: column; gap: 10px; margin-bottom: 100px;}
.otherlogin{width: 196px; height: 48px; border-radius: 100px;background: #6BC4A2; text-align: center; line-height: 48px; margin: 0 auto;}
.otherlogin a span{font-size: 14px; color: #fff; font-weight: 300;}
.signup a span{font-size: 14px; color: #00995E; text-decoration: underline;}
    </style>
</head>
<body>
    <div class="wrap">

<div class="background">
<img src="images/duckduckrich_charac/DuckDuckRich_mascot_basic.png">
</div>
    <div class="logo">
        <img src="images/duckduckrich_logo/DuckDuckRich_letterlogo2(transparent).png" alt="상단로고">
    </div>
    <div class="down">
     <div class="icons">
    <div class="kakao">
        <a href="index-3.html"><i class="fa-brands fa-kakao-talk" style="color: #F8F5E0;"></i></a>
    </div>
    <div class="apple">
        <a href="index-6.html"><i class="fa-brands fa-apple" style="color: #F8F5E0;"></i></a>
    </div>
        </div>
    <div class="btn">
        <div class="otherlogin">
            <a href="index-6.html"><span>다른 방법으로 로그인</span></a>
        </div>
        <div class="signup">
            <a href="index-5.html"><span>회원가입</span></a>
        </div>
    </div>
    </div>

    </div>

    <script src="js/jquery-4.0.0.min.js"></script>

</body>
</html>
