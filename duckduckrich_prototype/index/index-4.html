<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>DuckDuckRich Signup Screen</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <style>
        /* @charset "UTF-8"; */
*{box-sizing: border-box; text-decoration: none; color: #333;}
body{margin: 0; height: 874px; width: 402px; display: flex; flex-direction: column; background: #fff; font-family: 'Paperlogy', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden;}
.wrap{width: 402px; height: 874px;}
.wrap > div{display: flex; flex-direction: column; text-align: center;}
.up{display: flex; width: 100%; position: relative; margin: 20px auto;}
.logo{width: 100%; height: 80px;}
.logo img{width: 200px;}

.mascot{width: 300px; height: 300px; margin: 70px 50px 50px 50px; overflow: hidden;}

.btn-div{width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px;}
.signup-btn a{display: block; width: 155px; height: 45px; border-radius: 50px; background: #00995E; line-height: 45px; color: #f9f5e0; font-size: 1rem;}
.login-btn a{color: #00995E; font-size: .8rem; font-weight: 400; text-decoration: underline;}
    </style>

</head>
<body>

    <div class="wrap">

        <div class="up">
    <div class="logo">
        <img src="images/duckduckrich_logo/DuckDuckRich_letterlogo2(transparent).png" alt="상단로고">
    </div>
        </div>

        <div class="mascot">
            <img src="images/duckduckrich_charac/DuckDuckRich_mascot_success.png" alt="signup-duck">
        </div>

        <div class="btn-div">
            <div class="signup-btn">
                <a href="index-5.html">회원가입하기</a>
            </div>
            <div class="login-btn">
                <a href="index-3.html">로그인하기</a>
            </div>
        </div>

    </div>
    
    <script src="js/jquery-4.0.0.min.js"></script>

</body>
</html>
