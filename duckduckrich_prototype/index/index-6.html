<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>DuckDuckRich Login Screen</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

<style>
    /* @charset "UTF-8"; */
*{box-sizing: border-box; text-decoration: none; color: #333;}
body{margin: 0; height: 874px; width: 402px; display: flex; flex-direction: column; background: #fff; font-family: 'Paperlogy', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden;}
.wrap{width: 402px; height: 874px;}
.wrap > div{display: flex; flex-direction: column; text-align: center;}
.up{display: flex; width: 100%; position: relative; margin: 20px auto;}
.back-btn{position: absolute; left: 30px; top: 35px;}

.error{display: flex; flex-direction: column; gap: 40px; justify-content: center; align-items: center;}
.mascot{width: 300px; height: 300px; margin: 70px 50px 0 50px; overflow: hidden;}
.mascot img{width: 300px;}
.error-txt{width: 300px; height: 100px; text-align: center;}
.error-txt span{font-size: 1.5rem; font-weight: 350; color: #F79C00;}
.error-txt strong{font-weight: 400; color: #00995E;}

.btn-div{width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; margin-top: 30px;}
.retry-btn a{display: block; width: 155px; height: 45px; border-radius: 50px; background: #00995E; line-height: 45px; color: #f9f5e0; font-size: 1rem;}
.inquiry-btn a{color: #B39A00; font-size: .8rem; font-weight: 400; text-decoration: underline;}



/* fixed main btn commom css */
.main-btn-div{
    width: 402px; height: 105px; position: fixed; bottom: 0; left: 0; overflow: hidden;
    display: flex !important; flex-direction: row !important; justify-content: space-around; align-items: center;
    background: rgba(255, 255, 255, .15); -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, .3); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, .15);
    }
.main-btn{width: 70px; height: 60px; padding: 10px 5px;}
.main-btn:nth-child(2){width: 95px; height: 60px;}
.main-btn > a{display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; gap: 10px;}
.main-btn > a > span{display: block; font-size: .8rem; color: #005D39;}
.icon-div{display: flex; align-items: center; justify-content: center; height: 24px;}
.icon-div span{color: #005D39;}

/* fixed main btn custom css */
.material-symbols-outlined {
  font-variation-settings:
  'FILL' 0,
  'wght' 400,
  'GRAD' 0,
  'opsz' 24
}

</style>
</head>
<body>
    <div class="wrap">

        <div class="up">
        <div class="back-btn">
            <a href="javascript:history.back();"><i class="fa-solid fa-chevron-left" style="color: #B39A00;"></i></a>
        </div>
        </div>

        <div class="error">
            <div class="mascot">
                <img src="images/duckduckrich_charac/DuckDuckRich_mascot_fail.png" alt="error-duck">
            </div>
            <div class="error-txt">
                <span>
                    어? 이상해요! <br>
                    <strong>일시적인 오류가 발생했어요</strong>
                </span>
            </div>
        </div>

        <div class="btn-div">
            <div class="retry-btn">
                <a href="javascript:history.back();">다시 시도하기</a>
            </div>
            <div class="inquiry-btn">
                <a href="#">고객지원센터에 문의하기</a>
            </div>
        </div>

        <div class="main-btn-div">

            <div class="main-btn">
                <a href="#">
                <div class="icon-div">
                    <span class="material-symbols-outlined home">
                    home
                    </span>
                </div>
                <span>홈</span>
                </a>
            </div>

            <div class="main-btn">
                <a href="#">
                <div class="icon-div">
                    <span class="material-symbols-outlined hidden">
                    insert_chart
                    </span>
                </div>
                <span>숨은 보험금 조회</span>
                </a>
            </div>

            <div class="main-btn">
                <a href="#">
                <div class="icon-div">
                    <span class="material-symbols-outlined">
                    receipt_long
                    </span>
                </div>
                <span>보험금 청구</span>
                </a>
            </div>

            <div class="main-btn">
                <a href="#">
                <div class="icon-div">
                    <span class="material-symbols-outlined">
                    search
                    </span>
                </div>
                <span>검색</span>
                </a>
            </div>

        </div>

    </div>

    <script src="js/jquery-4.0.0.min.js"></script>
</body>
</html>
