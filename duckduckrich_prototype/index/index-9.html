<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>DuckDuckRich Hidden Insurance Search Loading Screen</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    
    <style>
        *{box-sizing: border-box; text-decoration: none; color: #333; list-style: none; margin: 0; padding: 0;}
body{margin: 0; height: 874px; width: 402px; display: flex; flex-direction: column; background: #fff; font-family: 'Paperlogy', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: auto;
overflow-x: hidden; scrollbar-width: none; }
html{scrollbar-width: none;}
html::-webkit-scrollbar, ::-webkit-scrollbar {display: none;}
.wrap{
    width: 402px; height: 874px;
    background: var(--bg);
    font-family: "Pretendard", -apple-system, BlinkMacSystemFont,
      "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #1c1c1c;
    }

    .screen {
    height: 100%;
    max-width: 420px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 0 20px;
    margin-top: max(56px, env(safe-area-inset-top, 0px) + 44px);
  }
  .back {
    position: absolute;
    left: 24px;
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    padding: 4px;
  }
  .header-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  .stage {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 0;
  }
  .flip-card {
    width: min(46vw, 176px);
    aspect-ratio: 1;
    position: relative;
    animation: flat-flip var(--cycle) infinite;
  }
  .face {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .face.front img, .face.back img{width: 100%; height: 100%;}
  .face.front {animation: show-front 3.6s infinite; }
  .face.back  {animation: show-back  3.6s infinite; }


  @keyframes flat-flip {
    0%     { transform: scaleX(1); animation-timing-function: ease-in; }
    11.1%  { transform: scaleX(0); animation-timing-function: ease-out; }
    22.2%  { transform: scaleX(1); }
    50%    { transform: scaleX(1); animation-timing-function: ease-in; }
    61.1%  { transform: scaleX(0); animation-timing-function: ease-out; }
    72.2%  { transform: scaleX(1); }
    100%   { transform: scaleX(1); }
  }

  @keyframes show-front {
    0%, 11.09%      { opacity: 1; }
    11.1%, 61.09%   { opacity: 0; }
    61.1%, 100%     { opacity: 1; }
  }
  @keyframes show-back {
    0%, 11.09%      { opacity: 0; }
    11.1%, 61.09%   { opacity: 1; }
    61.1%, 100%     { opacity: 0; }
  }


  .bottom {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 56px;
    padding-bottom: max(120px, env(safe-area-inset-bottom, 0px) + 104px);
  }
  .message {
    font-size: 24px;
    font-weight: 600;
    line-height: 1.45;
    letter-spacing: -0.02em;
    text-align: center;
    font-family: 'Paperlogy', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .message .name { color: #c09a2e; }

  .done-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 15px 30px;
    border: 2px solid #1e8b57;
    border-radius: 999px;
    background: #fff;
    color: #1e8b57;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.01em;
    cursor: pointer;
    /* 처음엔 숨김 : 자리는 그대로 차지해서 나타날 때 레이아웃이 밀리지 않음 */
    opacity: 0;
    visibility: hidden;
    transform: translateY(12px);
    transition: opacity .5s ease, transform .5s ease, visibility 0s .5s;
  }
  .done-btn.show {
    opacity: 1;
    visibility: visible;
    transform: none;
    transition: opacity .5s ease, transform .5s ease, visibility 0s;
  }
  .done-btn a {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: inherit;
  }

  @media (prefers-reduced-motion: reduce) {
    .flip-card, .face.front, .face.back { animation: none; }
    .face.back { opacity: 0; }
  }

    </style>

</head>
<body>

    <div class="wrap">

        <div class="screen">
    <header class="header">
      <button class="back" aria-label="뒤로 가기">
        <a href="javascript:history.back();">
        <svg width="12" height="20" viewBox="0 0 12 20" fill="none">
          <path d="M10 2 L3 10 L10 18" stroke="#c09a2e" stroke-width="3.4"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        </a>
      </button>
      <div class="header-title">
        <img src="images/duckduckrich_title/hidden-subtitle.png" alt="숨은 보험금 조회">
      </div>
    </header>

    <div class="stage">
      <div class="flip-card" role="img" aria-label="조회 진행 중 애니메이션">
        <div class="face front">
            <img src="images/duckduckrich_logo/DuckDuckRich_logoshape_outlined.png" alt="loading logo">
        </div>
        <div class="face back">
            <img src="images/duckduckrich_logo/DuckDuckRich_logoshape_yellow.png" alt="loading logo">
        </div>
      </div>
    </div>

    <div class="bottom">
      <p class="message"><span class="name">김준비</span> 님의 보험금을<br/>찾는 중이에요</p>
      <button class="done-btn" id="doneBtn">
        <a href="index-10.html">
        <svg width="15" height="13" viewBox="0 0 15 13" fill="none" aria-hidden="true">
          <path d="M1.5 6.5 L5.5 11 L13.5 1.5" stroke="#1e8b57" stroke-width="2.6"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        숨은 보험금 조회 완료
        </a>
      </button>
    </div>
  </div>

    </div>

    <script>
      const doneBtn = document.getElementById('doneBtn');

      setTimeout(() => {
        doneBtn.classList.add('show');

        setTimeout(() => {
          location.href = 'index-10.html';
        }, 1000);
      }, 3000);
    </script>

</body>
</html>
