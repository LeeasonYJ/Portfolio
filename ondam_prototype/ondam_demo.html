<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>온답 ONDAP — 당신의 답이 누군가의 온기가 됩니다</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --orange:#D9702C;
    --orange-deep:#B4551B;
    --orange-soft:#F5D9C3;
    --brown:#6B4226;
    --brown-deep:#452A17;
    --ink:#2A211A;
    --cream:#FBF6F0;
    --cream-dim:#F3E7DA;
    --gray:#8A7E73;
    --line:rgba(42,33,26,0.12);
    --good:#3E7A4E;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',-apple-system,sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    font-size:15.5px;
    line-height:1.65;
  }
  a{ color:inherit; text-decoration:none; cursor:pointer; }
  button{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; font-size:inherit; }
  .serif{ font-family:'Noto Serif KR','Nanum Myeongjo',serif; }

  .app{ max-width:1180px; margin:0 auto; min-height:100vh; background:#fff; box-shadow:0 0 60px rgba(69,42,23,0.07); }

  /* ===== WHO식 상단 유틸리티 바 ===== */
  .utilbar{
    background:var(--brown-deep); color:rgba(255,255,255,0.82);
    display:flex; justify-content:space-between; align-items:center;
    padding:7px 36px; font-size:12px; font-weight:600; letter-spacing:0.02em;
  }
  .utilbar .l{ display:flex; gap:18px; }
  .utilbar button:hover{ color:#fff; }

  /* ===== 메인 내비게이션 ===== */
  .nav{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 36px; border-bottom:2.5px solid var(--orange); background:#fff;
    position:sticky; top:0; z-index:50;
  }
  .nav .logo{ display:flex; align-items:baseline; gap:8px; cursor:pointer; }
  .nav .logo .ko{ font-size:23px; font-weight:900; color:var(--brown-deep); letter-spacing:-0.02em; }
  .nav .logo .ko em{ font-style:normal; color:var(--orange); }
  .nav .logo .en{ font-size:10.5px; font-weight:800; letter-spacing:0.22em; color:var(--gray); }
  .nav .menu{ display:flex; gap:28px; font-size:14px; font-weight:700; color:var(--ink); }
  .nav .menu button{ opacity:0.62; padding:4px 0; border-bottom:2.5px solid transparent; transition:all .15s; }
  .nav .menu button:hover{ opacity:1; }
  .nav .menu .on{ opacity:1; color:var(--orange-deep); border-bottom-color:var(--orange); }
  .nav .actions{ display:flex; gap:12px; align-items:center; }
  .nav .point-chip{
    display:flex; align-items:center; gap:6px; background:var(--cream-dim); border-radius:20px;
    padding:7px 14px; font-size:12.5px; font-weight:800; color:var(--brown); cursor:pointer;
  }
  .nav .point-chip b{ color:var(--orange-deep); }

  .btn{
    font-size:13.5px; font-weight:800; padding:11px 22px; border-radius:26px;
    background:var(--orange); color:#fff; white-space:nowrap; display:inline-block; transition:all .15s;
    text-align:center;
  }
  .btn:hover{ background:var(--orange-deep); }
  .btn.ghost{ background:transparent; color:var(--brown); border:1.5px solid var(--brown); }
  .btn.ghost:hover{ background:var(--cream-dim); }
  .btn.brown{ background:var(--brown); }
  .btn.brown:hover{ background:var(--brown-deep); }
  .btn.lg{ font-size:15px; padding:14px 32px; }
  .btn.disabled{ background:var(--cream-dim); color:var(--gray); cursor:default; }

  .screen{ display:none; }
  .screen.active{ display:block; animation:fadeIn .25s ease; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  .photo{ position:relative; overflow:hidden; background:#d9c9b8; }
  .photo img.real{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:1; }

  .body-pad{ padding:40px 36px 64px; }

  /* ===== 섹션 헤더 (WHO식 좌측 액센트 바) ===== */
  .sec-head{ display:flex; align-items:center; gap:12px; margin-bottom:8px; }
  .sec-head::before{ content:''; width:5px; height:24px; background:var(--orange); border-radius:2px; flex-shrink:0; }
  .sec-head h2{ font-size:22px; font-weight:800; margin:0; letter-spacing:-0.01em; }
  .sec-sub{ font-size:14px; color:var(--gray); margin:0 0 24px 17px; }

  /* ===== 홈: 히어로 ===== */
  .hero{ height:430px; position:relative; }
  .hero::after{
    content:''; position:absolute; inset:0; z-index:2;
    background:linear-gradient(100deg, rgba(50,28,12,0.82) 0%, rgba(69,42,23,0.55) 48%, rgba(69,42,23,0.12) 100%);
  }
  .hero-inner{ position:relative; z-index:4; height:100%; display:flex; flex-direction:column; justify-content:center; padding:0 56px; max-width:720px; }
  .hero-eyebrow{
    display:inline-flex; align-items:center; gap:8px; background:rgba(255,255,255,0.14); color:#FBD9BC;
    font-size:12px; font-weight:800; letter-spacing:0.06em; padding:7px 14px; border-radius:20px;
    width:fit-content; margin-bottom:18px; backdrop-filter:blur(3px);
  }
  .hero h1{ color:#fff; font-size:37px; font-weight:900; margin:0 0 14px; line-height:1.42; letter-spacing:-0.01em; }
  .hero h1 em{ font-style:normal; color:#F7B97E; }
  .hero .sub{ color:rgba(255,255,255,0.88); font-size:15.5px; line-height:1.7; margin-bottom:26px; max-width:480px; }
  .hero .cta-row{ display:flex; gap:12px; flex-wrap:wrap; }
  .hero .btn.ghost:hover{ background:rgba(255,255,255,0.18); }

  /* ===== 홈: 통계 스트립 ===== */
  .stat-strip{
    background:var(--brown-deep); color:#fff; display:grid; grid-template-columns:repeat(3,1fr);
    padding:26px 36px; gap:24px;
  }
  .stat-strip .item{ text-align:center; border-left:1px solid rgba(255,255,255,0.16); }
  .stat-strip .item:first-child{ border-left:none; }
  .stat-strip .v{ font-size:26px; font-weight:900; color:#F7B97E; letter-spacing:-0.01em; }
  .stat-strip .l{ font-size:12.5px; opacity:0.75; margin-top:4px; font-weight:600; }

  /* ===== 홈: 설문 카드 ===== */
  .chip-row{ display:flex; gap:9px; margin:0 0 26px 17px; flex-wrap:wrap; }
  .chip{
    display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:700;
    border:1.3px solid var(--line); border-radius:20px; padding:8px 16px; background:#fff; color:var(--ink);
    transition:all .15s;
  }
  .chip.on{ background:var(--brown); color:#fff; border-color:var(--brown); }
  .chip:hover{ border-color:var(--orange); }

  .survey-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:22px; }
  .survey-card{
    background:#fff; border:1.5px solid var(--line); border-radius:16px; overflow:hidden;
    transition:transform .15s, box-shadow .15s, border-color .15s; display:flex; flex-direction:column;
  }
  .survey-card:hover{ transform:translateY(-3px); box-shadow:0 14px 30px rgba(69,42,23,0.12); border-color:var(--orange-soft); }
  .survey-card .top{ display:flex; }
  .survey-card .photo{ width:150px; flex-shrink:0; }
  .survey-card .head{ padding:18px 20px 14px; flex:1; }
  .survey-card .cat{ font-size:11px; font-weight:800; color:var(--orange-deep); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:6px; display:flex; align-items:center; gap:8px; }
  .survey-card .cat .verified{ background:#EEF5EF; color:var(--good); padding:2px 8px; border-radius:6px; font-size:10px; }
  .survey-card h3{ font-size:16.5px; font-weight:800; margin:0 0 8px; line-height:1.42; }
  .survey-card .meta{ font-size:12px; color:var(--gray); font-weight:600; }
  .survey-card .meta b{ color:var(--ink); }
  .survey-card .bottom{
    border-top:1px dashed var(--line); padding:13px 20px; display:flex; align-items:center; justify-content:space-between;
    background:var(--cream); gap:10px; margin-top:auto;
  }
  .survey-card .partner{ display:flex; align-items:center; gap:8px; font-size:12px; color:var(--gray); font-weight:600; min-width:0; }
  .survey-card .partner .dot{ width:24px; height:24px; border-radius:50%; background:var(--orange-soft); color:var(--brown); font-size:10.5px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .survey-card .partner span{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .reward-badge{
    background:var(--orange); color:#fff; font-size:14px; font-weight:900; padding:6px 14px; border-radius:10px;
    letter-spacing:0.01em; flex-shrink:0;
  }
  .survey-card .done-badge{ background:var(--cream-dim); color:var(--gray); font-size:12px; font-weight:800; padding:6px 14px; border-radius:10px; flex-shrink:0; }

  /* ===== 홈: 운영 구조 3단계 ===== */
  .how-wrap{ background:var(--cream); border-radius:20px; padding:36px; margin-top:56px; }
  .how-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:18px; margin-top:24px; }
  .how-card{ background:#fff; border-radius:14px; padding:24px; border:1.5px solid var(--line); position:relative; }
  .how-card .step{
    position:absolute; top:-13px; left:20px; background:var(--brown); color:#fff;
    font-size:11.5px; font-weight:800; padding:5px 12px; border-radius:14px; letter-spacing:0.04em;
  }
  .how-card .icon{ font-size:26px; margin-bottom:10px; }
  .how-card h3{ font-size:15.5px; font-weight:800; margin:0 0 8px; }
  .how-card p{ font-size:13.5px; line-height:1.65; margin:0; color:var(--ink); opacity:0.8; }
  .how-flow-note{
    margin-top:22px; background:#fff; border-left:4px solid var(--orange); border-radius:0 10px 10px 0;
    padding:14px 20px; font-size:13.5px; line-height:1.7;
  }
  .how-flow-note b{ color:var(--orange-deep); }

  /* ===== 홈: 파트너 단체 스트립 ===== */
  .partner-strip{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
  .partner-card{
    background:#fff; border:1.5px solid var(--line); border-radius:14px; overflow:hidden;
    cursor:pointer; transition:transform .15s, box-shadow .15s, border-color .15s;
  }
  .partner-card:hover{ transform:translateY(-2px); box-shadow:0 10px 22px rgba(69,42,23,0.10); border-color:var(--orange-soft); }
  .partner-card .photo{ height:96px; }
  .partner-card .body{ padding:13px 15px; }
  .partner-card .nm{ font-size:13.5px; font-weight:800; }
  .partner-card .cat{ font-size:11px; color:var(--gray); margin-top:3px; font-weight:600; }

  /* ===== 단체 소개 화면 ===== */
  .org-hero{ height:280px; position:relative; }
  .org-hero::after{
    content:''; position:absolute; inset:0; z-index:2;
    background:linear-gradient(180deg, rgba(50,28,12,0.05) 30%, rgba(50,28,12,0.78) 100%);
  }
  .org-hero .back-chip{
    position:absolute; top:18px; left:36px; z-index:6; background:rgba(255,255,255,0.92); color:var(--ink);
    font-size:12.5px; font-weight:800; padding:8px 16px; border-radius:20px; cursor:pointer;
  }
  .org-hero .back-chip:hover{ background:#fff; }
  .org-hero-text{ position:absolute; bottom:0; left:0; right:0; z-index:4; padding:24px 36px; }
  .org-hero-text .tag{
    font-size:11px; font-weight:800; background:rgba(255,255,255,0.22); color:#fff;
    padding:5px 12px; border-radius:8px; display:inline-block; margin-bottom:10px; backdrop-filter:blur(2px);
  }
  .org-hero-text h1{ color:#fff; font-size:26px; font-weight:900; margin:0 0 5px; }
  .org-hero-text .sub{ color:rgba(255,255,255,0.86); font-size:13px; font-weight:600; }
  .org-purpose{
    background:var(--cream); border-left:4px solid var(--orange); border-radius:0 12px 12px 0;
    padding:18px 22px; font-size:14.5px; line-height:1.8; margin:0 0 30px;
  }
  .org-purpose b{ color:var(--brown); }

  /* ===== 설문 참여 화면 ===== */
  .survey-shell{ max-width:720px; margin:0 auto; padding:48px 24px 72px; }
  .crumb{ font-size:12.5px; color:var(--gray); font-weight:600; margin-bottom:22px; }
  .crumb b{ color:var(--brown); }

  .survey-intro-card{ background:#fff; border:1.5px solid var(--line); border-radius:20px; overflow:hidden; }
  .survey-intro-card .photo{ height:200px; }
  .survey-intro-card .body{ padding:30px 34px 34px; }
  .survey-intro-card h1{ font-size:24px; font-weight:800; margin:0 0 10px; line-height:1.45; }
  .intro-meta-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:22px 0; }
  .intro-meta{ background:var(--cream); border-radius:12px; padding:14px; text-align:center; }
  .intro-meta .v{ font-size:17px; font-weight:900; color:var(--orange-deep); }
  .intro-meta .l{ font-size:11px; color:var(--gray); font-weight:700; margin-top:3px; }
  .trust-note{
    display:flex; gap:12px; background:var(--cream); border-radius:12px; padding:16px 18px;
    font-size:13px; line-height:1.65; margin-bottom:24px; align-items:flex-start;
  }
  .trust-note .ic{ font-size:19px; flex-shrink:0; }
  .trust-note b{ color:var(--brown); }

  .progress-wrap{ margin-bottom:28px; }
  .progress-label{ display:flex; justify-content:space-between; font-size:12.5px; font-weight:800; margin-bottom:8px; }
  .progress-label .r{ color:var(--orange-deep); }
  .progress-track{ background:var(--cream-dim); border-radius:6px; height:8px; overflow:hidden; }
  .progress-bar{ height:100%; background:linear-gradient(90deg, var(--orange), var(--orange-deep)); border-radius:6px; transition:width .3s ease; }

  .q-card{ background:#fff; border:1.5px solid var(--line); border-radius:20px; padding:36px; }
  .q-num{ font-size:12.5px; font-weight:800; color:var(--orange-deep); letter-spacing:0.06em; margin-bottom:12px; }
  .q-text{ font-size:20px; font-weight:700; line-height:1.55; margin:0 0 26px; }
  .opt-list{ display:flex; flex-direction:column; gap:10px; }
  .opt{
    display:flex; align-items:center; gap:14px; border:1.5px solid var(--line); border-radius:14px;
    padding:16px 20px; font-size:15px; font-weight:600; background:#fff; transition:all .13s; text-align:left; width:100%;
  }
  .opt:hover{ border-color:var(--orange); background:#FDF4EC; }
  .opt .radio{
    width:20px; height:20px; border-radius:50%; border:2px solid var(--line); flex-shrink:0; position:relative; transition:all .13s;
  }
  .opt.picked{ border-color:var(--orange); background:#FDF4EC; }
  .opt.picked .radio{ border-color:var(--orange); }
  .opt.picked .radio::after{ content:''; position:absolute; inset:3px; border-radius:50%; background:var(--orange); }

  /* ===== 보상 선택 화면 ===== */
  .reward-hero{ text-align:center; padding:16px 0 8px; }
  .reward-hero .badge{ font-size:44px; margin-bottom:6px; }
  .reward-hero h1{ font-size:26px; font-weight:900; margin:0 0 8px; }
  .reward-hero h1 em{ font-style:normal; color:var(--orange-deep); }
  .reward-hero .sub{ font-size:14px; color:var(--gray); margin-bottom:30px; }
  .reward-choice{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .choice-card{
    background:#fff; border:2px solid var(--line); border-radius:18px; padding:28px 24px; text-align:center;
    transition:all .15s; display:flex; flex-direction:column; gap:6px; align-items:center;
  }
  .choice-card:hover{ border-color:var(--orange); transform:translateY(-3px); box-shadow:0 12px 28px rgba(69,42,23,0.12); }
  .choice-card .ic{ font-size:32px; }
  .choice-card h3{ font-size:17px; font-weight:800; margin:6px 0 2px; }
  .choice-card p{ font-size:12.5px; color:var(--gray); line-height:1.6; margin:0 0 14px; }
  .choice-card .btn{ width:100%; }
  .choice-card.donate{ border-color:var(--orange-soft); background:linear-gradient(180deg,#fff 30%, #FDF4EC 100%); }
  .reward-fineprint{ text-align:center; font-size:12px; color:var(--gray); margin-top:20px; line-height:1.7; }

  /* ===== 임팩트 리포트 화면 ===== */
  .impact-hero{ background:var(--brown-deep); color:#fff; padding:52px 36px 46px; position:relative; overflow:hidden; }
  .impact-hero::after{
    content:''; position:absolute; right:-60px; top:-60px; width:280px; height:280px; border-radius:50%;
    background:radial-gradient(circle, rgba(217,112,44,0.35), transparent 70%);
  }
  .impact-hero .eyebrow{ font-size:12px; font-weight:800; letter-spacing:0.14em; color:#F7B97E; margin-bottom:12px; }
  .impact-hero h1{ font-size:29px; font-weight:900; margin:0 0 10px; line-height:1.45; }
  .impact-hero .sub{ font-size:14px; opacity:0.82; max-width:560px; line-height:1.7; }
  .impact-numbers{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:30px; position:relative; z-index:2; }
  .impact-num-card{ background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.14); border-radius:14px; padding:20px; }
  .impact-num-card .v{ font-size:24px; font-weight:900; color:#F7B97E; }
  .impact-num-card .l{ font-size:12px; opacity:0.78; margin-top:5px; font-weight:600; }

  .fee-flow{ background:#fff; border:1.5px solid var(--line); border-radius:18px; padding:30px 34px; }
  .fee-flow h3{ font-size:16px; font-weight:800; margin:0 0 6px; }
  .fee-flow .desc{ font-size:13.5px; color:var(--gray); margin-bottom:22px; }
  .fee-bar-wrap{ display:flex; height:44px; border-radius:12px; font-size:12.5px; font-weight:800; color:#fff; }
  .fee-seg{ display:flex; align-items:center; justify-content:center; gap:4px; min-width:0; position:relative; cursor:default; }
  .fee-seg:first-child{ border-radius:12px 0 0 12px; }
  .fee-seg:last-child{ border-radius:0 12px 12px 0; }
  /* 호버 시 금액 말풍선 */
  .fee-seg::after{
    content:attr(data-tip); position:absolute; bottom:calc(100% + 10px); left:50%;
    transform:translateX(-50%) translateY(5px);
    background:var(--brown-deep); color:#fff; font-size:11.5px; font-weight:800;
    padding:6px 12px; border-radius:8px; white-space:nowrap;
    opacity:0; pointer-events:none; transition:opacity .15s, transform .15s; z-index:6;
    box-shadow:0 6px 16px rgba(0,0,0,0.2);
  }
  .fee-seg::before{
    content:''; position:absolute; bottom:calc(100% + 4px); left:50%;
    transform:translateX(-50%) translateY(5px);
    border:6px solid transparent; border-top-color:var(--brown-deep); border-bottom:none;
    opacity:0; pointer-events:none; transition:opacity .15s, transform .15s; z-index:6;
  }
  .fee-seg:hover::after, .fee-seg:hover::before{ opacity:1; transform:translateX(-50%) translateY(0); }
  .fee-seg:nth-child(1){ background:var(--orange); }
  .fee-seg:nth-child(2){ background:var(--brown); }
  .fee-seg:nth-child(3){ background:#A08874; }
  .fee-legend{ display:flex; gap:22px; margin-top:14px; flex-wrap:wrap; }
  .fee-legend .item{ display:flex; align-items:center; gap:7px; font-size:12.5px; font-weight:600; color:var(--gray); }
  .fee-legend .sw{ width:12px; height:12px; border-radius:3px; }

  /* WHO식 발간물 리스트 */
  .report-list{ border-top:2px solid var(--ink); }
  .report-row{
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    padding:17px 6px; border-bottom:1px solid var(--line); transition:background .12s; cursor:pointer;
  }
  .report-row:hover{ background:var(--cream); }
  .report-row .info .t{ font-size:14.5px; font-weight:700; }
  .report-row .info .d{ font-size:12px; color:var(--gray); margin-top:3px; font-weight:600; }
  .report-row .dl{ font-size:12px; font-weight:800; color:var(--orange-deep); flex-shrink:0; }

  /* ===== 마이지갑 화면 ===== */
  .wallet-summary{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:28px; }
  .wallet-summary .card{ background:#fff; border:1.5px solid var(--line); border-radius:16px; padding:22px; }
  .wallet-summary .card.hl{ background:linear-gradient(150deg, var(--orange), var(--orange-deep)); color:#fff; border:none; }
  .wallet-summary .v{ font-size:25px; font-weight:900; color:var(--brown-deep); }
  .wallet-summary .card.hl .v{ color:#fff; }
  .wallet-summary .l{ font-size:12.5px; color:var(--gray); margin-top:5px; font-weight:700; }
  .wallet-summary .card.hl .l{ color:rgba(255,255,255,0.85); }
  .exchange-row{ display:flex; gap:10px; margin-bottom:36px; flex-wrap:wrap; }

  .history-row{

   .cnt[data-target] 요소를 0부터 목표값까지 약 1.4초간 easeOutCubic으로 증가.
   화면 재진입 시마다 재생, 같은 화면 내 재렌더(필터 등)에서는 즉시 확정값 표시. */
function animateCounts(instant){
  document.querySelectorAll('.cnt').forEach(el => {
    const target = Math.round(parseFloat(el.dataset.target));
    if(instant){ el.textContent = fmt(target); return; }
    const dur = 1400;
    const t0 = performance.now();
    function tick(now){
      const p = Math.min((now - t0) / dur, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      el.textContent = fmt(Math.round(target * eased));
      if(p < 1 && el.isConnected) requestAnimationFrame(tick);
      else el.textContent = fmt(target);
    }
    requestAnimationFrame(tick);
  });
}

/* ===== 설문 플로우 ===== */
function startSurvey(id){
  if(state.completed.has(id)){ toast('이미 참여를 완료한 설문이에요'); return; }
  state.activeSurvey = id;
  state.phase = 'intro';
  state.qIndex = 0;
  state.answers = [];
  go('survey');
}
function beginQuestions(){
  state.phase = 'q';
  render();
  window.scrollTo({top:0, behavior:'instant'});
}
function pickOpt(i){
  const sv = SURVEYS[state.activeSurvey];
  state.answers[state.qIndex] = i;
  // 선택 표시 후 잠깐 뒤 다음 문항으로
  render();
  setTimeout(()=>{
    if(state.qIndex < sv.questions.length - 1){
      state.qIndex++;
    } else {
      state.phase = 'reward';
      state.completed.add(sv.id);
    }
    render();
    window.scrollTo({top:0, behavior:'instant'});
  }, 320);
}
function receiveReward(){
  const sv = SURVEYS[state.activeSurvey];
  state.points += sv.reward;
  state.history.unshift({ type:'earn', title:sv.title, sub:'2026.07.03 참여 완료', amt:sv.reward });
  toast(fmt(sv.reward) + 'P가 지갑에 적립되었어요');
  go('wallet');
}
function donateReward(){
  const sv = SURVEYS[state.activeSurvey];
  state.myDonated += sv.reward;
  state.history.unshift({ type:'donate', title:sv.partner + ' 기부 전환', sub:'2026.07.03 · ' + sv.title + ' 보상', amt:sv.reward });
  toast(sv.partner + '에 ' + fmt(sv.reward) + '원이 전달될 예정이에요');
  go('impact');
}
function onCatClick(c){
  state.filterCat = c;
  render();
}

          {t:'2026년 5월 기부금 집행 보고서', d:'2026.06.01 발행 · 외부 회계법인 검토 완료'},
          {t:'2026년 4월 기부금 집행 보고서', d:'2026.05.01 발행 · 외부 회계법인 검토 완료'},
          {t:'2026년 1분기 리서치 윤리 심의 결과', d:'2026.04.10 발행 · 파트너 단체 공동 심의'}
        ].map(r=>`
        <div class="report-row" onclick="toast('보고서 열람은 데모에서 제공되지 않아요')">
          <div class="info"><div class="t">${r.t}</div><div class="d">${r.d}</div></div>
          <span class="dl">PDF 열람 ↓</span>
        </div>`).join('')}
      </div>
    </div>

    <div style="margin-top:52px;">
      <div class="sec-head"><h2>기부를 전달받은 단체</h2></div>
      <p class="sec-sub">전달된 기부금은 각 단체의 활동 보고와 함께 공개됩니다.</p>
      <div class="partner-strip">
        ${PARTNERS.map((p,i)=>`
        <div class="partner-card" onclick="goOrg(${i})">
          <div class="photo"><img class="real" src="${p.img}" alt="${p.nm} 활동 현장"></div>
          <div class="body"><div class="nm">${p.nm}</div><div class="cat">${p.cat}</div></div>
        </div>`).join('')}
      </div>
    </div>
  </div>

  ${footerHtml()}
  `;
}

/* ===== 마이지갑 화면 ===== */
function renderWallet(){
  const rows = state.history.map(h=>`
    <div class="history-row">
      <div class="ic ${h.type}">${h.type==='earn' ? '✍️' : '🌱'}</div>
      <div class="info">
        <div class="t">${h.title}</div>
        <div class="d">${h.sub}</div>
      </div>
      <div class="amt ${h.type==='earn' ? 'plus' : 'gift'}">${h.type==='earn' ? '+' : ''}${fmt(h.amt)}${h.type==='earn' ? 'P' : '원 기부'}</div>
    </div>`).join('');

  return `
  ${navHtml('wallet')}
  <div class="body-pad">
    <div class="sec-head"><h2>마이지갑</h2></div>
    <p class="sec-sub">모은 포인트를 현금으로 바꾸거나, 언제든 기부로 전환할 수 있어요.</p>

    <div class="wallet-summary">
      <div class="card hl"><div class="v">${fmt(state.points)}P</div><div class="l">보유 포인트 (1P = 1원)</div></div>
      <div class="card"><div class="v">${fmt(state.myDonated)}원</div><div class="l">내가 기부로 전환한 금액</div></div>
      <div class="card"><div class="v">${state.history.filter(h=>h.type==='earn').length}건</div><div class="l">참여 완료한 설문</div></div>
    </div>

    <div class="exchange-row">
      <a class="btn" onclick="toast('현금 전환은 데모에서 제공되지 않아요')">현금으로 전환</a>
      <a class="btn ghost" onclick="toast('기프티콘 교환은 데모에서 제공되지 않아요')">기프티콘 교환</a>
      <a class="btn brown" onclick="toast('보유 포인트의 기부 전환은 데모에서 제공되지 않아요')">포인트 기부하기 🌱</a>
    </div>

    <div class="sec-head"><h2>참여 · 기부 내역</h2></div>
    <p class="sec-sub">최근 활동 순으로 표시됩니다.</p>
    ${rows || '<div class="empty-hint">아직 활동 내역이 없어요. 첫 설문에 참여해보세요!</div>'}
  </div>
  ${footerHtml()}
  `;
}

/* ===== 단체 소개 화면 ===== */
function renderOrg(){
  const o = PARTNERS[state.activeOrg];
  if(!o) return renderHome();
  return `
  ${navHtml('')}
  <div class="org-hero photo">
    <img class="real" src="${o.img}" alt="${o.nm} 활동 현장">
    <div class="back-chip" onclick="goOrgBack()">← 돌아가기</div>
    <div class="org-hero-text">
      <span class="tag">${o.cat}</span>
      <h1 class="serif">${o.nm}</h1>
      <div class="sub">${o.est} 설립 · 온답 검증 파트너</div>
    </div>
  </div>
  <div class="body-pad">
    <div class="sec-head"><h2>단체 소개</h2></div>
    <p class="sec-sub">온답과 함께 설문을 검증하고 기부를 전달받는 파트너 단체입니다.</p>
    <div class="org-purpose">${o.purpose}</div>

    <div class="intro-meta-grid" style="max-width:560px; margin:0 0 40px;">
      <div class="intro-meta"><div class="v">${o.est}</div><div class="l">설립</div></div>
      <div class="intro-meta"><div class="v">${o.donated}</div><div class="l">온답 통해 전달된 기부</div></div>
      <div class="intro-meta"><div class="v">${o.surveys}건</div><div class="l">검증한 설문</div></div>
    </div>

    <div class="sec-head"><h2>최근 활동 소식</h2></div>
    <p class="sec-sub">단체가 직접 등록한 활동 현황입니다.</p>
    <div class="report-list">
      ${o.news.map(n=>`
      <div class="report-row" onclick="toast('소식 본문 열람은 데모에서 제공되지 않아요')">
        <div class="info"><div class="t">${n.t}</div><div class="d">${n.d}</div></div>
        <span class="dl">자세히 →</span>
      </div>`).join('')}
    </div>

    <div style="margin-top:36px; display:flex; gap:10px; flex-wrap:wrap;">
      <a class="btn" onclick="toast('직접 기부는 데모에서 제공되지 않아요')">이 단체에 기부하기 🌱</a>
      <a class="btn ghost" onclick="goOrgBack()">목록으로 돌아가기</a>
    </div>
  </div>
  ${footerHtml()}
  `;
}
</script>
<script>
function render(){
  const app = document.getElementById('app');
  let html = '';
  if(state.screen === 'home') html = renderHome();
  else if(state.screen === 'survey') html = renderSurvey();
  else if(state.screen === 'impact') html = renderImpact();
  else if(state.screen === 'wallet') html = renderWallet();
  else if(state.screen === 'org') html = renderOrg();
  const entered = state.screen !== window._prevScreen;
  window._prevScreen = state.screen;
  app.innerHTML = html;
  animateCounts(!entered);
}
render();
</script>
</body>
</html>
