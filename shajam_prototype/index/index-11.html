<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Shazam Play Page</title>

    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

    <style>
        /* @charset "UTF-8"; */
*{box-sizing: border-box; text-decoration: none; color: #333; list-style: none; margin: 0; padding: 0;}
body{margin: 0; height: 874px; width: 402px; display: flex; flex-direction: column; background: #fff; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard Variable", Pretendard, Roboto, "Noto Sans KR", "Segoe UI", "Malgun Gothic", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif; overflow: auto;
overflow-x: hidden; scrollbar-width: none; }
html{scrollbar-width: none;}
html::-webkit-scrollbar, ::-webkit-scrollbar {display: none;}
.wrap{width: 402px; height: 874px; background: #fff;}

.play{width: 100%; height: 100%; position: relative;}
.home-btn a{position: absolute; top: 55px; right: 20px; z-index: 1;}
.home-btn a img{width: auto; height: 30px;}
.play-btn a{position: absolute; top: 322px; left: 17px;}

/* 팝업 */
.popup{position: absolute; top: 300px; left: 30px;
opacity: 0; transform: scale(.6);
transform-origin: 0% 40%;
visibility: hidden; pointer-events: none;
transition: transform .2s ease-out, opacity .2s ease-out, visibility 0s linear .2s;}

.popup.open{opacity: 1; transform: scale(1);
visibility: visible; pointer-events: auto;
transition: transform .2s ease-out, opacity .2s ease-out, visibility 0s;}

.popup-img img{width: 340px; height: auto; display: block;
filter: drop-shadow(0 10px 24px rgba(0,0,0,.25));}


/* fixed screen overlay */
.full-overlay{width: 402px; height: 100px; position: fixed; bottom: 0; left: 0; z-index: 99999; background: linear-gradient(
    to top,
    rgba(255, 255, 255, 1) 0%,
    rgba(255, 255, 255, 1) 45%,
    rgba(255, 255, 255, 0) 100% );
  pointer-events: none;}

/* fixed main btn common css */
.main-btn-div{width: 372px; height: 68px; position: fixed; bottom: 20px; left: 15px; overflow: hidden;
display: flex !important; flex-direction: row !important; justify-content: space-around; align-items: center;
z-index: 999999;}
.main-btn a{width: calc(372px / 4); height: 70px; padding: 10px 4px; background: rgba(242, 242, 242, .5); display: block; display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 3px;
-webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);}
.main-btn a .icon-div{width: 45px; height: 45px; display: flex; justify-content: center; align-items: center;}
.main-btn a .icon-div img{width: auto; height: 35px;}
.main-btn a span{font-size: .8rem; color: #BAC7DA;}

/* fixed main btn custom css */
.main-btn:nth-child(2) a{border-radius: 20px;}
.main-btn:nth-child(1) a{border-radius: 20px;}
.main-btn:nth-child(3) a{border-radius: 20px 0 0 20px;}
.main-btn:nth-child(2) a span{font-weight: 600; color: #4158A7;}

    </style>
</head>
<body>
    <div class="wrap">
    <div class="play">
        <div class="home-btn">
            <a href="index-2.html">
                <img src="images/icons/home-icon.png" alt="home-btn">
            </a>
        </div>
        <div class="play-img">
            <img src="images/bg/play-bg.png" alt="play screen bg">
        </div>
        <div class="play-btn">
            <a href="#" id="open-popup">
                <img src="images/play-div-1.png" alt="play-btn">
            </a>
        </div>
    </div>

    <div class="full-overlay"></div>
    <div class="main-btn-div">
        <div class="main-btn">
        <a href="index-9.html">
            <div class="icon-div">
                <img src="images/icons/feed-category-icon.png" alt="category">
            </div>
            <span>카테고리</span>
        </a>
        </div>

        <div class="main-btn">
        <a href="index-11.html">
            <div class="icon-div">
                <img src="images/icons/feed-blue-play-icon.png" alt="play">
            </div>
            <span>Play#</span>
        </a>
        </div>

        <div class="main-btn">
        <a href="index-7.html">
            <div class="icon-div">
                <img src="images/icons/feed-feed-icon.png" alt="feed">
            </div>
            <span>피드</span>
        </a>
        </div>

        <div class="main-btn">
        <a href="#">
            <div class="icon-div">
                <img src="images/icons/search-icon.png">
            </div>
            <span>검색</span>
        </a>
        </div>
    </div>

    <div class="popup" id="popup" aria-hidden="true">
        <div class="popup-img">
            <img src="images/play-div-2.png" alt="play-popup">
        </div>
    </div>

    </div><!-- wrap end -->

    <script>
        (function(){
    var popup = document.getElementById('popup');
    var openBtn = document.getElementById('open-popup');

    openBtn.addEventListener('click', function(e){
        e.preventDefault();
        e.stopPropagation(); /* 아래 문서 클릭 핸들러에 잡혀 바로 닫히는 것 방지 */
        var isOpen = popup.classList.toggle('open');
        popup.setAttribute('aria-hidden', isOpen ? 'false' : 'true');
    });

    /* 말풍선 바깥 아무 곳이나 누르면 닫힘 */
    document.addEventListener('click', function(e){
        if (!popup.classList.contains('open')) return;
        if (!popup.contains(e.target)) {
            popup.classList.remove('open');
            popup.setAttribute('aria-hidden', 'true');
        }
    });
})();
    </script>
</body>
</html>
